@if (loading()) {
  <p>Loading events...</p>
} @else if (error()) {
  <p>{{ error() }}</p>
} @else {
  <ul>
    @for (event of events(); track event.id) {
      <li>
        <a [routerLink]="['/events', event.id]">
          {{ event.title }} — {{ event.startDate }} — {{ event.status }}
        </a>
      </li>
    }
  </ul>
}
